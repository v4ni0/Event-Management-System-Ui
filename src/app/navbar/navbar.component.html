<header class="navbar">
  <div class="navbar-inner">
    <a routerLink="/" class="logo">
      <svg class="logo-icon" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#3737f0" />
        <path d="M7 9h14M7 14h10M7 19h12"
              stroke="#fff" stroke-width="2.5" stroke-linecap="round" />
      </svg>
      <span class="logo-text">eventflow</span>
    </a>

    <div class="search-bar">
      <div class="search-segment">
        <mat-icon class="seg-icon">search</mat-icon>
        <input
          class="seg-input"
          type="text"
          placeholder="Search events"
          [(ngModel)]="searchQuery"
          (keydown.enter)="onSearch()"
        />
      </div>
      <div class="search-divider"></div>
      <div class="search-segment">
        <mat-icon class="seg-icon loc-icon">place</mat-icon>
        <input
          class="seg-input"
          type="text"
          placeholder="City"
          [(ngModel)]="location"
          (keydown.enter)="onSearch()"
        />
      </div>
      <button class="search-btn" (click)="onSearch()" aria-label="Search">
        <mat-icon>search</mat-icon>
      </button>
    </div>

    <nav class="nav-right">
      <a routerLink="/events" class="nav-link" routerLinkActive="active">Find Events</a>
      @if (canCreateEvents()) {
        <a routerLink="/events/new" class="nav-link" routerLinkActive="active">Create Events</a>
      }
      <a routerLink="/speakers" class="nav-link" routerLinkActive="active">Speakers</a>
      <div class="nav-divider"></div>

      @if (user(); as u) {
        <a routerLink="/my-tickets" class="nav-link" routerLinkActive="active">My Tickets</a>
        <button class="user-btn" mat-button [matMenuTriggerFor]="userMenu">
          <span class="user-name">{{ displayName() }}</span>
          <app-role-chip [role]="u.role"></app-role-chip>
          <mat-icon>arrow_drop_down</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu">
          <a mat-menu-item routerLink="/profile">
            <mat-icon>account_circle</mat-icon><span>Profile</span>
          </a>
          <a mat-menu-item routerLink="/my-tickets">
            <mat-icon>confirmation_number</mat-icon><span>My tickets</span>
          </a>
          @if (isAdmin()) {
            <a mat-menu-item routerLink="/admin/users">
              <mat-icon>people</mat-icon><span>Users (admin)</span>
            </a>
          }
          <button mat-menu-item (click)="signOut()">
            <mat-icon>logout</mat-icon><span>Sign out</span>
          </button>
        </mat-menu>
      } @else {
        <a routerLink="/login" class="nav-link sign-in">Sign in</a>
        <a routerLink="/register" class="nav-link sign-up">Sign up</a>
      }
    </nav>
  </div>
</header>
